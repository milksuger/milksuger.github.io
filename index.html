    <!-- bootstrap css -->
    <link rel="stylesheet" href="./assetss/bootstrap/css/bootstrap.min.css">
    <link rel="stylesheet" href="./assetss/css/index.css">
    <link rel="stylesheet" href="./assetss/css/common.css">
</head>

<body>
    <nav>
        <ul>
            <li><a href="./index.html">首页</a></li>

            <li><a href="./about.html">关于</a></li>
            <li><a href="./contact.html">联系</a></li>
        </ul>

    <!-- 轮播图 -->
    <div id="carouselExampleIndicators" class="carousel slide">
        <div class="carousel-indicators">
            <button type="button" data-bs-target="#carouselExampleIndicators" data-bs-slide-to="0" class="active"
                aria-current="true" aria-label="Slide 1"></button>
            <button type="button" data-bs-target="#carouselExampleIndicators" data-bs-slide-to="1"
                aria-label="Slide 2"></button>
            <button type="button" data-bs-target="#carouselExampleIndicators" data-bs-slide-to="2"
                aria-label="Slide 3"></button>
            <button type="button" data-bs-target="#carouselExampleIndicators" data-bs-slide-to="3"
                aria-label="Slide 4"></button>
            <button type="button" data-bs-target="#carouselExampleIndicators" data-bs-slide-to="4"
                aria-label="Slide 5"></button>
            <button type="button" data-bs-target="#carouselExampleIndicators" data-bs-slide-to="5"
                aria-label="Slide 6"></button>
            <button type="button" data-bs-target="#carouselExampleIndicators" data-bs-slide-to="6"
                aria-label="Slide 7"></button>
        </div>
        <div class="carousel-inner">
            <div class="carousel-item active">
                <img src="./assetss/images/banner/banner-01.png" class="d-block w-100 custom-img-size" alt="...">
            </div>
            <div class="carousel-item">
                <img src="./assetss/images/banner/banner-02.png" class="d-block w-100 custom-img-size" alt="...">
            </div>
            <div class="carousel-item">
                <img src="./assetss/images/banner/banner-03.png" class="d-block w-100 custom-img-size" alt="...">
            </div>
            <div class="carousel-item">
                <img src="./assetss/images/banner/banner-04.png" class="d-block w-100 custom-img-size" alt="...">
            </div>
            <div class="carousel-item">
                <img src="./assetss/images/banner/banner-05.png" class="d-block w-100 custom-img-size" alt="...">
            </div>
            <div class="carousel-item">
                <img src="./assetss/images/banner/banner-06.png" class="d-block w-100 custom-img-size" alt="...">
            </div>
            <div class="carousel-item">
                <img src="./assetss/images/banner/banner-07.png" class="d-block w-100 custom-img-size" alt="...">
            </div>
        </div>
        <button class="carousel-control-prev" type="button" data-bs-target="#carouselExampleIndicators"
            data-bs-slide="prev">
            <span class="carousel-control-prev-icon" aria-hidden="true"></span>
            <span class="visually-hidden">Previous</span>
        </button>
        <button class="carousel-control-next" type="button" data-bs-target="#carouselExampleIndicators"
            data-bs-slide="next">
            <span class="carousel-control-next-icon" aria-hidden="true"></span>
            <span class="visually-hidden">Next</span>
        </button>
    </div>

    <h1>这里是首页</h1>

    <!-- bootstrap js -->
    <script src="./assetss/bootstrap/js/bootstrap.min.js"></script>
</body>

</html>
